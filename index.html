<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario Pro - Helados Cali</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #2563eb; --success: #22c55e; --danger: #ef4444; --dark: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f1f5f9; padding: 15px; color: var(--dark); }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--primary); margin-top: 0; }
        
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; background: #f8fafc; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
        input { padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 16px; width: 85%; }
        
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; color: #64748b; font-size: 12px; text-transform: uppercase; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; }
        
        .stock-control { display: flex; align-items: center; gap: 10px; }
        .btn-qty { width: 35px; height: 35px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; font-size: 18px; }
        .btn-plus { background: var(--success); }
        .btn-minus { background: var(--danger); }
        .stock-val { font-weight: bold; font-size: 1.1rem; min-width: 30px; text-align: center; }
        
        .editable { border-bottom: 1px dashed #2563eb; cursor: pointer; font-weight: 500; }
        .save-btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>🍦 Helados Cali - Inventario</h2>
    
    <div class="form-grid">
        <input type="text" id="inv-nombre" placeholder="Nuevo Helado">
        <input type="number" id="inv-stock" placeholder="Stock Inicial">
        <input type="number" step="0.01" id="inv-costo" placeholder="Costo $">
        <input type="number" step="0.01" id="inv-precio" placeholder="Venta $">
        <button class="save-btn" onclick="guardarProducto()">+ Agregar</button>
    </div>

    <table id="tabla-inventario">
        <thead>
            <tr>
                <th>Producto</th>
                <th>Stock</th>
                <th>Costo ($)</th>
                <th>Venta ($)</th>
            </tr>
        </thead>
        <tbody>
            <tr><td colspan="4" style="text-align:center">Cargando...</td></tr>
        </tbody>
    </table>
</div>

<script>
    const SUPABASE_URL = 'https://osdvdutepsfpxfijeatd.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9zZHZkdXRlcHNmcHhmaWplYXRkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3NzQ0MzgsImV4cCI6MjA4OTM1MDQzOH0.OWUMwz0LKvP2ifedGVjErOkGuKXvCxF6lMnyn6Nebks';
    const { createClient } = supabase;
    const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    async function cargarInventario() {
        const { data, error } = await _supabase.from('productos').select('*').order('nombre');
        if (error) return console.log(error);

        const tbody = document.querySelector('#tabla-inventario tbody');
        tbody.innerHTML = '';

        data.forEach(p => {
            tbody.innerHTML += `
                <tr>
                    <td><span class="editable" onclick="editarCampo(${p.id}, 'nombre', '${p.nombre}')">${p.nombre}</span></td>
                    <td>
                        <div class="stock-control">
                            <button class="btn-qty btn-minus" onclick="ajustarStock(${p.id}, ${p.stock}, -1)">-</button>
                            <span class="stock-val">${p.stock}</span>
                            <button class="btn-qty btn-plus" onclick="ajustarStock(${p.id}, ${p.stock}, 1)">+</button>
                        </div>
                    </td>
                    <td><span class="editable" onclick="editarCampo(${p.id}, 'costo', ${p.costo})">$${p.costo}</span></td>
                    <td><span class="editable" onclick="editarCampo(${p.id}, 'precio_venta', ${p.precio_venta})">$${p.precio_venta}</span></td>
                </tr>
            `;
        });
    }

    async function ajustarStock(id, actual, cambio) {
        const nuevoStock = actual + cambio;
        if (nuevoStock < 0) return;
        await _supabase.from('productos').update({ stock: nuevoStock }).eq('id', id);
        cargarInventario();
    }

    async function editarCampo(id, columna, valorActual) {
        const nuevoValor = prompt(`Editar ${columna}:`, valorActual);
        if (nuevoValor !== null && nuevoValor !== "") {
            const updateData = {};
            updateData[columna] = nuevoValor;
            await _supabase.from('productos').update(updateData).eq('id', id);
            cargarInventario();
        }
    }

    async function guardarProducto() {
        const nombre = document.getElementById('inv-nombre').value;
        const stock = parseInt(document.getElementById('inv-stock').value);
        const costo = parseFloat(document.getElementById('inv-costo').value) || 0;
        const precio = parseFloat(document.getElementById('inv-precio').value) || 0;

        if (!nombre || isNaN(stock)) return alert("Nombre y Stock obligatorios");

        await _supabase.from('productos').upsert({ nombre, stock, costo, precio_venta: precio }, { onConflict: 'nombre' });
        
        document.querySelectorAll('input').forEach(i => i.value = '');
        cargarInventario();
    }

    window.onload = cargarInventario;
</script>

</body>
</html>
