<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cali Control - Heladería</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #2563eb; --success: #10b981; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f1f5f9; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 12px; shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 20px; }
        input { padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; }
        button { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e2e8f0; }
    </style>
</head>
<body>

<div class="container">
    <h2>🍦 Inventario Helados Cali</h2>
    <p style="font-size: 0.8rem; color: gray;">Si no guarda, revisa la consola (F12)</p>
    
    <div class="form-grid">
        <input type="text" id="inv-nombre" placeholder="Nombre (ej: Barquilla)">
        <input type="number" id="inv-stock" placeholder="Stock">
        <input type="number" step="0.01" id="inv-costo" placeholder="Costo $">
        <input type="number" step="0.01" id="inv-precio" placeholder="Venta $">
        <button onclick="guardarProducto()">Guardar Helado</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Producto</th>
                <th>Stock</th>
                <th>Costo</th>
                <th>Venta</th>
            </tr>
        </thead>
        <tbody id="tabla-inventario">
            <tr><td colspan="4">Cargando datos...</td></tr>
        </tbody>
    </table>
</div>

<script>
    // CREDENCIALES DIRECTAS
    const SUPABASE_URL = 'https://osdvdutepsfpxfijeatd.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9zZHZkdXRlcHNmcHhmaWplYXRkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3NzQ0MzgsImV4cCI6MjA4OTM1MDQzOH0.OWUMwz0LKvP2ifedGVjErOkGuKXvCxF6lMnyn6Nebks';
    
    // FORMA CORRECTA DE INICIALIZAR EN NAVEGADOR
    const { createClient } = supabase;
    const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    async function cargarInventario() {
        try {
            const { data, error } = await _supabase.from('productos').select('*').order('nombre');
            if (error) throw error;

            const tbody = document.getElementById('tabla-inventario');
            tbody.innerHTML = '';
            
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4">No hay productos aún.</td></tr>';
            }

            data.forEach(p => {
                tbody.innerHTML += `<tr>
                    <td><strong>${p.nombre}</strong></td>
                    <td>${p.stock}</td>
                    <td>$${p.costo}</td>
                    <td>$${p.precio_venta}</td>
                </tr>`;
            });
        } catch (err) {
            console.error("Error cargando:", err);
        }
    }

    async function guardarProducto() {
        const nombre = document.getElementById('inv-nombre').value;
        const stock = parseInt(document.getElementById('inv-stock').value);
        const costo = parseFloat(document.getElementById('inv-costo').value) || 0;
        const precio = parseFloat(document.getElementById('inv-precio').value) || 0;

        if (!nombre || isNaN(stock)) {
            alert("Por favor pon al menos el nombre y el stock");
            return;
        }

        try {
            const { error } = await _supabase.from('productos').upsert({ 
                nombre: nombre, 
                stock: stock, 
                costo: costo, 
                precio_venta: precio 
            }, { onConflict: 'nombre' });

            if (error) throw error;

            alert("✅ ¡Guardado!");
            // Limpiar campos
            document.getElementById('inv-nombre').value = '';
            document.getElementById('inv-stock').value = '';
            cargarInventario();
        } catch (err) {
            alert("Error al guardar: " + err.message);
            console.error(err);
        }
    }

    // Ejecutar al cargar la página
    window.onload = cargarInventario;
</script>

</body>
</html>
