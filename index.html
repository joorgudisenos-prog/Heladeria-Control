<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cali Control v2.8 - Oficial</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #2563eb; --success: #22c55e; --warning: #f59e0b; --danger: #ef4444; --dark: #1e293b; --light-green: #dcfce7; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f1f5f9; padding-bottom: 50px; }
        nav { background: var(--dark); padding: 12px; display: flex; justify-content: center; gap: 8px; position: sticky; top: 0; z-index: 1000; overflow-x: auto; }
        nav button { background: rgba(255,255,255,0.1); border: none; color: white; padding: 10px 15px; border-radius: 8px; cursor: pointer; white-space: nowrap; }
        nav button.active { background: var(--primary); font-weight: bold; }
        .container { max-width: 1000px; margin: 20px auto; padding: 0 15px; }
        .section { display: none; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .section.active { display: block; }
        .pos-layout { display: grid; grid-template-columns: 1fr 340px; gap: 20px; }
        @media (max-width: 800px) { .pos-layout { grid-template-columns: 1fr; } }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
        .product-btn { background: var(--light-green); border: 2px solid #bbf7d0; padding: 15px; border-radius: 12px; text-align: center; cursor: pointer; color: #166534; transition: 0.2s; }
        .product-btn.agotado { background: #fee2e2; border-color: #fca5a5; color: #991b1b; cursor: not-allowed; opacity: 0.7; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.9rem; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #f1f5f9; }
        .btn-stock { width: 30px; height: 30px; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; }
        .btn-del { background: none; border: none; color: var(--danger); font-weight: bold; cursor: pointer; font-size: 1.1rem; padding: 5px; }
        .stat-card { padding:20px; border-radius:12px; color:white; text-align:center; }
    </style>
</head>
<body>

<nav>
    <button onclick="showTab('pos')" id="btn-pos" class="active">🛒 Vender</button>
    <button onclick="showTab('inventario')" id="btn-inventario">📦 Inventario</button>
    <button onclick="showTab('historial')" id="btn-historial">📜 Historial</button>
    <button onclick="showTab('caja')" id="btn-caja">💰 Caja / Saldo</button>
</nav>

<div class="container">
    <div id="pos" class="section active">
        <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom:15px;">
            <h2>Punto de Venta</h2>
            <div style="background:#e0f2fe; padding:10px; border-radius:8px; display:flex; align-items:center; gap:8px;">
                Tasa BCV: 
                <input type="number" id="tasa-val" step="0.01" onchange="guardarTasaBD(this.value)" style="width:75px; font-weight:bold; border:none; background:transparent; color:var(--primary);">
                <button onclick="actualizarTasaAutomatica()" style="background:none; border:none; cursor:pointer; font-size:1.1rem;" title="Actualizar desde BCV">🔄</button>
            </div>
        </div>
        <div class="pos-layout">
            <div id="pos-lista" class="products-grid"></div>
            <div class="cart-panel" style="background:#f8fafc; padding:15px; border-radius:12px; border:1px solid #ddd;">
                <h3>Pedido Actual</h3>
                <input type="text" id="cliente-nombre" placeholder="Nombre del Cliente" style="width:90%; padding:10px; border-radius:8px; border:1px solid #ccc; margin-bottom:10px;">
                <div id="carrito-items" style="min-height:80px; border-bottom:1px solid #ddd; margin-bottom:10px;"></div>
                <div style="margin-bottom:15px;">
                    <strong>Total USD: </strong><span id="total-usd" style="color:var(--success); font-size:1.2rem;">$0.00</span><br>
                    <strong>Total Bs: </strong><span id="total-bs" style="color:var(--primary); font-size:1.4rem;">Bs 0.00</span>
                </div>
                <button onclick="finalizarVenta('pagado')" style="width:100%; background:var(--success); color:white; border:none; padding:12px; border-radius:8px; margin-bottom:8px; cursor:pointer; font-weight:bold;">CONFIRMAR PAGO</button>
                <button onclick="finalizarVenta('pendiente')" style="width:100%; background:var(--warning); color:white; border:none; padding:12px; border-radius:8px; cursor:pointer; font-weight:bold;">PAGO PENDIENTE</button>
                <button onclick="limpiarCarrito()" style="width:100%; background:#94a3b8; color:white; border:none; padding:8px; border-radius:8px; cursor:pointer;">Vaciar</button>
            </div>
        </div>
    </div>

    <div id="inventario" class="section">
        <h2>Gestión de Inventario</h2>
        <table id="tabla-inv">
            <thead><tr><th>Nombre</th><th>Stock</th><th>Costo</th><th>Venta</th><th>Acción</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <div id="historial" class="section">
        <div style="display:flex; justify-content: space-between; align-items:center;">
            <h2>Ventas Mensuales</h2>
            <input type="month" id="filtro-mes" onchange="cargarHistorial()" style="padding:8px; border-radius:8px; border:1px solid #ccc;">
        </div>
        <table id="tabla-hist">
            <thead><tr><th>Fecha</th><th>Cliente</th><th>Total $</th><th>Total Bs</th><th>Estado</th><th>Acciones</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <div id="caja" class="section">
        <h2>Resumen de Caja</h2>
        <input type="month" id="filtro-caja" onchange="cargarCaja()" style="padding:10px; border-radius:8px; border:1px solid #ccc; margin-bottom:20px;">
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">
            <div class="stat-card" style="background:var(--primary)"><h3>Ventas Totales ($)</h3><p id="caja-total-usd" style="font-size:1.8rem; font-weight:bold;">$0.00</p></div>
            <div class="stat-card" style="background:var(--warning)"><h3>Por Cobrar ($)</h3><p id="caja-pendientes" style="font-size:1.8rem; font-weight:bold;">$0.00</p></div>
            <div class="stat-card" style="background:var(--success)"><h3>Caja Bolívares</h3><p id="caja-total-bs" style="font-size:1.8rem; font-weight:bold;">Bs 0.00</p></div>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://osdvdutepsfpxfijeatd.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9zZHZkdXRlcHNmcHhmaWplYXRkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3NzQ0MzgsImV4cCI6MjA4OTM1MDQzOH0.OWUMwz0LKvP2ifedGVjErOkGuKXvCxF6lMnyn6Nebks';
    const { createClient } = supabase;
    const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    let carrito = [];
    let productosLocal = [];

    window.onload = async () => {
        const ahora = new Date();
        const mesActual = ahora.toISOString().substring(0, 7);
        document.getElementById('filtro-mes').value = mesActual;
        document.getElementById('filtro-caja').value = mesActual;
        
        await cargarTasaBD();
        actualizarTasaAutomatica(); // Intenta actualizar desde el BCV al abrir
        cargarPOS();
    };

    async function cargarTasaBD() {
        const { data } = await _supabase.from('configuracion').select('tasa_bcv').eq('id', 1).single();
        if (data) document.getElementById('tasa-val').value = data.tasa_bcv;
    }

    async function guardarTasaBD(valor) {
        await _supabase.from('configuracion').update({ tasa_bcv: parseFloat(valor) }).eq('id', 1);
        dibujarCarrito();
    }

async function actualizarTasaAutomatica() {
    const input = document.getElementById('tasa-val');
    const originalValue = input.value;
    input.value = "..."; // Indicador visual de que está buscando

    try {
        // Intento 1: API de PyDolar
        let res = await fetch('https://pydolarvenezuela-api.vercel.app/api/v1/dollar?page=bcv');
        let data = await res.json();
        let precio = data.monitors.usd.price;

        if (!precio) {
            // Intento 2: API alternativa si la primera falla
            res = await fetch('https://ve.dolarapi.com/v1/dolares/oficial');
            data = await res.json();
            precio = data.promedio;
        }

        if (precio) {
            input.value = precio;
            await guardarTasaBD(precio);
            console.log("Tasa actualizada con éxito: " + precio);
        } else {
            throw new Error("No se obtuvo precio");
        }
    } catch (e) {
        console.error("Error al obtener tasa:", e);
        input.value = originalValue;
        alert("No se pudo obtener la tasa del BCV automáticamente. Por favor, ingrésala a mano.");
    }
}

    function showTab(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('btn-' + id).classList.add('active');
        if(id === 'pos') cargarPOS();
        if(id === 'inventario') cargarInventario();
        if(id === 'historial') cargarHistorial();
        if(id === 'caja') cargarCaja();
    }

    async function cargarPOS() {
        const { data } = await _supabase.from('productos').select('*').order('nombre');
        productosLocal = data || [];
        renderizarBotonesPOS();
    }

    function renderizarBotonesPOS() {
        const lista = document.getElementById('pos-lista');
        lista.innerHTML = productosLocal.map(p => {
            const agotado = p.stock <= 0;
            return `<div class="product-btn ${agotado ? 'agotado' : ''}" onclick="${agotado ? '' : `agregarAlCarrito(${p.id})`}">
                <strong>${p.nombre}</strong><br><span>$${p.precio_venta}</span><br><small>${agotado ? 'AGOTADO' : `${p.stock} disp.`}</small>
            </div>`;
        }).join('');
    }

    function agregarAlCarrito(id) {
        const i = productosLocal.findIndex(p => p.id === id);
        if (productosLocal[i].stock > 0) {
            productosLocal[i].stock--;
            carrito.push({...productosLocal[i]});
            renderizarBotonesPOS();
            dibujarCarrito();
        }
    }

    function dibujarCarrito() {
        const div = document.getElementById('carrito-items');
        const tasa = parseFloat(document.getElementById('tasa-val').value) || 0;
        let total = 0;
        div.innerHTML = carrito.map((item, i) => {
            total += item.precio_venta;
            return `<div style="display:flex; justify-content:space-between; font-size:0.85rem; margin-bottom:4px;">
                <span>${item.nombre}</span>
                <span>$${item.precio_venta} <button onclick="quitarDelCarrito(${i}, ${item.id})" style="color:red; border:none; background:none; cursor:pointer;">x</button></span>
            </div>`;
        }).join('');
        document.getElementById('total-usd').textContent = `$${total.toFixed(2)}`;
        document.getElementById('total-bs').textContent = `Bs ${(total * tasa).toFixed(2)}`;
    }

    function quitarDelCarrito(index, idOriginal) {
        const iP = productosLocal.findIndex(p => p.id === idOriginal);
        productosLocal[iP].stock++;
        carrito.splice(index, 1);
        renderizarBotonesPOS();
        dibujarCarrito();
    }

    async function finalizarVenta(estado) {
        if(carrito.length === 0) return;
        const totalUsd = carrito.reduce((acc, i) => acc + i.precio_venta, 0);
        const tasa = parseFloat(document.getElementById('tasa-val').value);
        const cliente = document.getElementById('cliente-nombre').value || 'Cliente Gral';
        const detalle = carrito.map(c => c.nombre).join(', ');

        // Guardar sin columna de ganancia para evitar errores
        const { error } = await _supabase.from('ventas').insert({
            cliente_nombre: cliente, productos_detalle: detalle,
            total_usd: totalUsd, tasa_momento: tasa, total_bs: totalUsd * tasa, estado: estado
        });

        if (error) { alert("Error: " + error.message); return; }

        // Actualizar Stock
        const conteo = {};
        carrito.forEach(x => { conteo[x.id] = (conteo[x.id] || 0) + 1; });
        for (const id in conteo) { await _supabase.rpc('increment_stock', { row_id: id, x: -conteo[id] }); }

        // Espera de sincronización
        await new Promise(r => setTimeout(r, 600));

        carrito = [];
        document.getElementById('cliente-nombre').value = '';
        await cargarPOS();
        await cargarHistorial();
        await cargarCaja();
        dibujarCarrito();
        alert("¡Venta Registrada!");
    }

    async function cargarInventario() {
        const { data } = await _supabase.from('productos').select('*').order('nombre');
        const tbody = document.querySelector('#tabla-inv tbody');
        tbody.innerHTML = data.map(p => `
            <tr>
                <td><input type="text" style="width:100px" value="${p.nombre}" id="edit-nom-${p.id}"></td>
                <td>
                    <button class="btn-stock" style="background:var(--danger)" onclick="modStockBD(${p.id}, ${p.stock}, -1)">-</button>
                    <span>${p.stock}</span>
                    <button class="btn-stock" style="background:var(--success)" onclick="modStockBD(${p.id}, ${p.stock}, 1)">+</button>
                </td>
                <td>$${p.costo}</td>
                <td>$${p.precio_venta}</td>
                <td><button onclick="guardarFila(${p.id})" style="background:var(--success); color:white; border:none; border-radius:4px; cursor:pointer;">✓</button></td>
            </tr>
        `).join('');
    }

    async function modStockBD(id, actual, cambio) {
        await _supabase.from('productos').update({ stock: actual + cambio }).eq('id', id);
        cargarInventario();
    }

    async function cargarHistorial() {
        const mesFiltro = document.getElementById('filtro-mes').value;
        const { data } = await _supabase.from('ventas').select('*').order('fecha', {ascending:false});
        const filtrados = data ? data.filter(v => v.fecha.startsWith(mesFiltro)) : [];
        const tbody = document.querySelector('#tabla-hist tbody');
        tbody.innerHTML = filtrados.map(v => `
            <tr>
                <td>${v.fecha.substring(8,10)}/${v.fecha.substring(5,7)}</td>
                <td>${v.cliente_nombre}</td>
                <td>$${v.total_usd.toFixed(2)}</td>
                <td>Bs ${v.total_bs.toFixed(2)}</td>
                <td style="color:${v.estado === 'pendiente' ? 'red' : 'green'}"><strong>${v.estado}</strong></td>
                <td><button class="btn-del" onclick="eliminarVenta(${v.id})">✕</button></td>
            </tr>
        `).join('');
    }

    async function eliminarVenta(id) {
        if(confirm("¿Eliminar?")) {
            await _supabase.from('ventas').delete().eq('id', id);
            await new Promise(r => setTimeout(r, 400));
            cargarHistorial();
            cargarCaja();
        }
    }

    async function cargarCaja() {
        const mesFiltro = document.getElementById('filtro-caja').value;
        const { data } = await _supabase.from('ventas').select('*');
        if(!data) return;
        const mesData = data.filter(v => v.fecha.startsWith(mesFiltro));
        const totalUsd = mesData.reduce((acc, v) => acc + v.total_usd, 0);
        const totalBs = mesData.reduce((acc, v) => acc + v.total_bs, 0);
        const pendientes = mesData.filter(v => v.estado === 'pendiente').reduce((acc, v) => acc + v.total_usd, 0);

        document.getElementById('caja-total-usd').textContent = `$${totalUsd.toFixed(2)}`;
        document.getElementById('caja-total-bs').textContent = `Bs ${totalBs.toFixed(2)}`;
        document.getElementById('caja-pendientes').textContent = `$${pendientes.toFixed(2)}`;
    }

    function limpiarCarrito() {
        carrito = [];
        cargarPOS();
        dibujarCarrito();
    }
</script>
</body>
</html>
