<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cali Control v4.6 - Fix Total</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --primary: #2563eb; --success: #3ab568; --danger: #ef4e57; --warning: #f59e0b; --dark: #1e293b; 
            --text-dark: #1f5e3d; --text-danger-dark: #81292e; 
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f1f5f9; padding-bottom: 50px; }
        nav { background: var(--dark); padding: 12px; display: flex; justify-content: center; gap: 8px; position: sticky; top: 0; z-index: 1000; overflow-x: auto; }
        nav button { background: rgba(255,255,255,0.1); border: none; color: white; padding: 10px 15px; border-radius: 8px; cursor: pointer; white-space: nowrap; font-size: 0.9rem; }
        nav button.active { background: var(--primary); font-weight: bold; }
        .container { max-width: 1100px; margin: 20px auto; padding: 0 15px; }
        .section { display: none; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .section.active { display: block; }
        
        /* Botones estilo imagen */
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .product-btn { 
            background-color: var(--success); border: none; border-radius: 25px; padding: 15px;
            display: flex; flex-direction: column; justify-content: space-between; cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); aspect-ratio: 2 / 1;
        }
        .product-btn.agotado { background-color: var(--danger); opacity: 0.8; }
        .product-btn .name-area { font-size: 1.1rem; font-weight: 800; color: var(--text-dark); text-align: center; flex-grow: 1; display: flex; align-items: center; justify-content: center; text-transform: uppercase; }
        .product-btn .info-area { display: flex; justify-content: space-between; color: white; font-weight: 700; font-size: 0.9rem; }
        
        .cart-panel { background: #f8fafc; padding: 15px; border-radius: 12px; border: 1px solid #ddd; position: sticky; top: 80px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.85rem; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #f1f5f9; }
        .inline-input { border: 1px solid #ccc; padding: 6px; border-radius: 6px; width: 100%; box-sizing: border-box; }
        .stat-card { padding: 20px; border-radius: 12px; color: white; text-align: center; }
    </style>
</head>
<body>

<nav>
    <button onclick="showTab('pos')" id="btn-pos" class="active">🛒 Vender</button>
    <button onclick="showTab('inventario')" id="btn-inventario">📦 Inventario</button>
    <button onclick="showTab('historial')" id="btn-historial">📜 Historial</button>
    <button onclick="showTab('caja')" id="btn-caja">💰 Saldo</button>
</nav>

<div class="container">
    <div id="pos" class="section active">
        <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom:15px;">
            <h2>Punto de Venta</h2>
            <div style="background:#e0f2fe; padding:8px; border-radius:8px; display:flex; align-items:center; gap:8px;">
                <small>BCV:</small>
                <input type="number" id="tasa-val" step="0.01" onchange="guardarTasaBD(this.value)" style="width:70px; font-weight:bold; border:none; background:transparent;">
                <button onclick="actualizarTasaAutomatica()" style="background:var(--primary); color:white; border:none; border-radius:4px; padding:5px 8px; cursor:pointer; font-size:0.7rem;">ACTUALIZAR</button>
            </div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 320px; gap: 20px;">
            <div id="pos-lista" class="products-grid"></div>
            <div class="cart-panel">
                <h3>Pedido</h3>
                <input type="text" id="cliente-nombre" placeholder="Nombre Cliente" class="inline-input" style="margin-bottom:10px;">
                <div id="carrito-items" style="min-height:50px; border-bottom:1px solid #ddd; margin-bottom:10px;"></div>
                <div style="margin-bottom:15px;">
                    <strong>Total USD: </strong><span id="total-usd" style="color:var(--success); font-size:1.2rem;">$0.00</span><br>
                    <strong>Total Bs: </strong><span id="total-bs" style="color:var(--primary); font-size:1.4rem;">Bs 0.00</span>
                </div>
                <button onclick="finalizarVenta('pagado')" style="width:100%; background:var(--success); color:white; border:none; padding:12px; border-radius:8px; margin-bottom:8px; cursor:pointer; font-weight:bold;">CONFIRMAR PAGO</button>
                <button onclick="finalizarVenta('pendiente')" style="width:100%; background:var(--warning); color:white; border:none; padding:10px; border-radius:8px; cursor:pointer;">DEJAR PENDIENTE</button>
                <button onclick="limpiarCarrito()" style="width:100%; background:#94a3b8; color:white; border:none; padding:6px; border-radius:8px; cursor:pointer; margin-top:10px; font-size:0.7rem;">Vaciar</button>
            </div>
        </div>
    </div>

    <div id="inventario" class="section">
        <h2>Gestión de Helados</h2>
        <div style="background: #f8fafc; padding: 15px; border-radius: 10px; display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; align-items: end; margin-bottom: 20px;">
            <div><label><small>Nombre</small></label><input type="text" id="new-nom" class="inline-input"></div>
            <div><label><small>Stock</small></label><input type="number" id="new-stock" class="inline-input" value="0"></div>
            <div><label><small>Costo $</small></label><input type="number" step="0.01" id="new-costo" class="inline-input" value="0.00"></div>
            <div><label><small>Venta $</small></label><input type="number" step="0.01" id="new-venta" class="inline-input" value="0.00"></div>
            <button onclick="crearProducto()" style="background:var(--primary); color:white; border:none; padding:10px; border-radius:6px; cursor:pointer; font-weight:bold;">AÑADIR +</button>
        </div>
        <table id="tabla-inv">
            <thead><tr><th>Producto</th><th>Stock</th><th>Costo $</th><th>Venta $</th><th>Acción</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <div id="historial" class="section"><h2>Historial</h2><input type="month" id="filtro-mes" onchange="cargarHistorial()"><table id="tabla-hist"><thead><tr><th>Fecha</th><th>Cliente</th><th>USD</th><th>Bs</th><th>Estado</th><th></th></tr></thead><tbody></tbody></table></div>
    <div id="caja" class="section"><h2>Saldo</h2><input type="month" id="filtro-caja" onchange="cargarCaja()"><div id="stats-caja" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap:20px;"></div></div>
</div>

<script>
    const SUPABASE_URL = 'https://osdvdutepsfpxfijeatd.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9zZHZkdXRlcHNmcHhmaWplYXRkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3NzQ0MzgsImV4cCI6MjA4OTM1MDQzOH0.OWUMwz0LKvP2ifedGVjErOkGuKXvCxF6lMnyn6Nebks';
    const { createClient } = supabase;
    const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    let carrito = [];
    let productosLocal = [];

    window.onload = async () => {
        const ahora = new Date();
        const mesActual = ahora.toISOString().substring(0, 7);
        document.getElementById('filtro-mes').value = mesActual;
        document.getElementById('filtro-caja').value = mesActual;
        await cargarTasaBD();
        actualizarTasaAutomatica();
        cargarPOS();
    };

    async function cargarTasaBD() {
        const { data } = await _supabase.from('configuracion').select('tasa_bcv').eq('id', 1).single();
        if (data) document.getElementById('tasa-val').value = data.tasa_bcv.toFixed(2);
    }

    async function guardarTasaBD(v) { await _supabase.from('configuracion').update({ tasa_bcv: parseFloat(v) }).eq('id', 1); dibujarCarrito(); }

    async function actualizarTasaAutomatica() {
        try {
            const res = await fetch("https://api.allorigins.win/get?url=" + encodeURIComponent("https://ve.dolarapi.com/v1/dolares/oficial"));
            const json = await res.json();
            const data = JSON.parse(json.contents);
            if(data.promedio) {
                document.getElementById('tasa-val').value = data.promedio.toFixed(2);
                await guardarTasaBD(data.promedio);
            }
        } catch(e) { console.error("Error tasa"); }
    }

    function showTab(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('btn-' + id).classList.add('active');
        if(id === 'pos') cargarPOS();
        if(id === 'inventario') cargarInventario();
        if(id === 'historial') cargarHistorial();
        if(id === 'caja') cargarCaja();
    }

    async function cargarPOS() {
        const { data } = await _supabase.from('productos').select('*').order('nombre');
        productosLocal = data || [];
        document.getElementById('pos-lista').innerHTML = productosLocal.map(p => `
            <button class="product-btn ${p.stock <= 0 ? 'agotado' : ''}" onclick="${p.stock > 0 ? `addCart(${p.id})` : ''}">
                <div class="name-area">${p.nombre}</div>
                <div class="info-area"><span>${p.stock} dips.</span><span>$${p.precio_venta.toFixed(2)}</span></div>
            </button>
        `).join('');
    }

    function addCart(id) {
        const p = productosLocal.find(x => x.id === id);
        p.stock--;
        carrito.push({...p});
        cargarPOS();
        dibujarCarrito();
    }

    function dibujarCarrito() {
        const tasa = parseFloat(document.getElementById('tasa-val').value) || 0;
        let total = 0;
        document.getElementById('carrito-items').innerHTML = carrito.map(item => {
            total += item.precio_venta;
            return `<div style="display:flex; justify-content:space-between; font-size:0.85rem; margin-bottom:4px;"><span>${item.nombre}</span><span>$${item.precio_venta.toFixed(2)}</span></div>`;
        }).join('');
        document.getElementById('total-usd').textContent = `$${total.toFixed(2)}`;
        document.getElementById('total-bs').textContent = `Bs ${(total * tasa).toFixed(2)}`;
    }

    async function finalizarVenta(estado) {
        if(carrito.length === 0) return;
        const totalUsd = carrito.reduce((a, b) => a + b.precio_venta, 0);
        const costoTotalUsd = carrito.reduce((a, b) => a + (b.precio_costo || 0), 0);
        const tasa = parseFloat(document.getElementById('tasa-val').value);
        
        const { error } = await _supabase.from('ventas').insert({
            cliente_nombre: document.getElementById('cliente-nombre').value || 'Gral',
            productos_detalle: carrito.map(c => c.nombre).join(', '),
            total_usd: totalUsd, tasa_momento: tasa, total_bs: totalUsd * tasa, costo_total_usd: costoTotalUsd, estado: estado
        });

        if(!error) {
            for (const item of carrito) { await _supabase.rpc('increment_stock', { row_id: item.id, x: -1 }); }
            limpiarCarrito();
            alert("Venta guardada");
        } else { alert("Error: " + error.message); }
    }

    function limpiarCarrito() { carrito = []; document.getElementById('cliente-nombre').value = ''; cargarPOS(); dibujarCarrito(); }

    async function cargarInventario() {
        const { data } = await _supabase.from('productos').select('*').order('nombre');
        document.querySelector('#tabla-inv tbody').innerHTML = data.map(p => `
            <tr>
                <td><input type="text" class="inline-input" value="${p.nombre}" id="inv-nom-${p.id}"></td>
                <td><strong>${p.stock}</strong></td>
                <td><input type="number" step="0.01" class="inline-input" value="${p.precio_costo || 0}" id="inv-costo-${p.id}"></td>
                <td><input type="number" step="0.01" class="inline-input" value="${p.precio_venta || 0}" id="inv-venta-${p.id}"></td>
                <td><button onclick="actualizarProducto(${p.id})" style="background:var(--success); color:white; border:none; padding:5px; border-radius:4px; cursor:pointer;">✓</button></td>
            </tr>
        `).join('');
    }

    async function actualizarProducto(id) {
        const n = document.getElementById(`inv-nom-${id}`).value;
        const c = parseFloat(document.getElementById(`inv-costo-${id}`).value);
        const v = parseFloat(document.getElementById(`inv-venta-${id}`).value);
        await _supabase.from('productos').update({ nombre: n, precio_costo: c, precio_venta: v }).eq('id', id);
        alert("Actualizado");
        cargarInventario();
    }

    async function crearProducto() {
        const n = document.getElementById('new-nom').value;
        const s = parseInt(document.getElementById('new-stock').value) || 0;
        const c = parseFloat(document.getElementById('new-costo').value) || 0;
        const v = parseFloat(document.getElementById('new-venta').value) || 0;
        if(!n) return alert("Nombre requerido");
        const { error } = await _supabase.from('productos').insert({ nombre: n, stock: s, precio_costo: c, precio_venta: v });
        if(!error) { alert("Añadido"); cargarInventario(); } else { alert(error.message); }
    }

    async function cargarHistorial() {
        const mes = document.getElementById('filtro-mes').value;
        const { data } = await _supabase.from('ventas').select('*').order('fecha', {ascending:false});
        const f = data ? data.filter(v => v.fecha.startsWith(mes)) : [];
        document.querySelector('#tabla-hist tbody').innerHTML = f.map(v => `<tr><td>${v.fecha.substring(8,10)}</td><td>${v.cliente_nombre}</td><td>$${v.total_usd.toFixed(2)}</td><td>Bs ${v.total_bs.toFixed(2)}</td><td style="color:${v.estado==='pendiente'?'red':'green'}">${v.estado}</td><td><button onclick="borrarV(${v.id})">✕</button></td></tr>`).join('');
    }

    async function cargarCaja() {
        const mes = document.getElementById('filtro-caja').value;
        const { data } = await _supabase.from('ventas').select('*');
        if(!data) return;
        const m = data.filter(v => v.fecha.startsWith(mes));
        const totalUsd = m.reduce((a,b)=>a+b.total_usd,0);
        const totalBs = m.filter(v=>v.estado==='pagado').reduce((a,b)=>a+b.total_bs,0);
        const gananciaBs = m.filter(v=>v.estado==='pagado').reduce((a,b)=>a+(b.total_bs - ((b.costo_total_usd||0)*b.tasa_momento)), 0);
        const pendientes = m.filter(v=>v.estado==='pendiente').reduce((a,b)=>a+b.total_usd,0);
        
        document.getElementById('stats-caja').innerHTML = `
            <div class="stat-card" style="background:var(--primary)"><h3>Total Vendido</h3><p>$${totalUsd.toFixed(2)}</p><p>Bs ${totalBs.toFixed(2)}</p></div>
            <div class="stat-card" style="background:var(--success)"><h3>Ganancia Real</h3><p>Bs ${gananciaBs.toFixed(2)}</p></div>
            <div class="stat-card" style="background:var(--warning)"><h3>Por Cobrar</h3><p>$${pendientes.toFixed(2)}</p></div>
        `;
    }
</script>
</body>
</html>
