<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario Heladería</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f2f5; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #0070f3; color: white; }
        .form-group { margin-bottom: 10px; }
        input { padding: 8px; margin-right: 5px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 15px; cursor: pointer; background: #0070f3; color: white; border: none; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🍦 Inventario Helados Cali</h2>
        
        <div class="form-group">
            <input type="text" id="nombre" placeholder="Nombre (ej: Barquilla)">
            <input type="number" id="stock" placeholder="Stock Inicial">
            <input type="number" step="0.01" id="costo" placeholder="Costo ($)">
            <input type="number" step="0.01" id="precio" placeholder="Venta ($)">
            <button onclick="agregarProducto()">Guardar</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Producto</th>
                    <th>Stock</th>
                    <th>Costo ($)</th>
                    <th>Venta ($)</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="tabla-cuerpo">
                </tbody>
        </table>
    </div>

    <script>
        function agregarProducto() {
            // Por ahora solo es visual, luego lo conectaremos a Supabase
            const nombre = document.getElementById('nombre').value;
            const stock = document.getElementById('stock').value;
            const costo = document.getElementById('costo').value;
            const precio = document.getElementById('precio').value;

            if(nombre && stock) {
                const fila = `<tr>
                    <td>${nombre}</td>
                    <td>${stock}</td>
                    <td>${costo}</td>
                    <td>${precio}</td>
                    <td><button style="background:red">Eliminar</button></td>
                </tr>`;
                document.getElementById('tabla-cuerpo').innerHTML += fila;
            }
        }
    </script>
</body>
</html>
