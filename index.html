<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cali Control v1.4</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #2563eb; --success: #22c55e; --warning: #f59e0b; --danger: #ef4444; --dark: #1e293b; --light-green: #dcfce7; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f1f5f9; padding-bottom: 30px; }
        nav { background: var(--dark); padding: 12px; display: flex; justify-content: center; gap: 10px; position: sticky; top: 0; z-index: 1000; }
        nav button { background: rgba(255,255,255,0.1); border: none; color: white; padding: 10px 18px; border-radius: 8px; cursor: pointer; }
        nav button.active { background: var(--primary); }
        .container { max-width: 1000px; margin: 20px auto; padding: 0 15px; }
        .section { display: none; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .section.active { display: block; }
        
        /* Inventario Editable */
        .input-inline { border: 1px solid transparent; padding: 5px; border-radius: 4px; width: 90%; font-size: 14px; transition: 0.2s; }
        .input-inline:focus { border-color: var(--primary); background: #fff; outline: none; }
        .btn-save-row { background: var(--success); color: white; border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
        .btn-save-row:hover { transform: scale(1.1); }

        /* POS */
        .pos-layout { display: grid; grid-template-columns: 1fr 340px; gap: 20px; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
        .product-btn { background: var(--light-green); border: 2px solid #bbf7d0; padding: 15px; border-radius: 12px; text-align: center; cursor: pointer; color: #166534; }
        .product-btn.agotado { background: #fee2e2; border-color: #fca5a5; color: #991b1b; cursor: not-allowed; }
        .cart-panel { background: #f8fafc; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; position: sticky; top: 80px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #f1f5f9; }
        .btn-stock { width: 28px; height: 28px; border: none; border-radius: 5px; color: white; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<nav>
    <button onclick="showTab('pos')" id="btn-pos" class="active">🛒 Vender</button>
    <button onclick="showTab('inventario')" id="btn-inventario">📦 Inventario</button>
    <button onclick="showTab('historial')" id="btn-historial">📜 Historial</button>
</nav>

<div class="container">
    <div id="pos" class="section active">
        <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom:15px;">
            <h2>Punto de Venta</h2>
            <div style="background:#e0f2fe; padding:10px; border-radius:8px;">
                Tasa BCV: <input type="number" id="tasa-val" step="0.01" onchange="guardarTasaBD(this.value)" style="width:70px; font-weight:bold; border:none; background:transparent; color:var(--primary);">
            </div>
        </div>
        <div class="pos-layout">
            <div id="pos-lista" class="products-grid"></div>
            <div class="cart-panel">
                <h3>Pedido</h3>
                <input type="text" id="cliente-nombre" placeholder="Nombre Cliente" style="width:90%; padding:10px; border-radius:8px; border:1px solid #ccc; margin-bottom:10px;">
                <div id="carrito-items" style="min-height:100px; max-height: 250px; overflow-y: auto; border-bottom:1px solid #ddd; margin-bottom:10px;"></div>
                <div style="margin:10px 0; font-weight:bold;">
                    Total USD: <span id="total-usd" style="color:var(--success); font-size:1.2rem;">$0.00</span><br>
                    Total Bs: <span id="total-bs" style="color:var(--primary); font-size:1.4rem;">Bs 0.00</span>
                </div>
                <button onclick="finalizarVenta('pagado')" style="width:100%; background:var(--success); color:white; border:none; padding:12px; border-radius:8px; margin-bottom:8px; cursor:pointer; font-weight:bold;">CONFIRMAR PAGO</button>
                <button onclick="finalizarVenta('pendiente')" style="width:100%; background:var(--warning); color:white; border:none; padding:12px; border-radius:8px; cursor:pointer; font-weight:bold;">DEJAR PENDIENTE</button>
                <button onclick="limpiarCarrito()" style="width:100%; background:#94a3b8; color:white; border:none; padding:8px; border-radius:8px; cursor:pointer; margin-top:5px;">Vaciar Carrito</button>
            </div>
        </div>
    </div>

    <div id="inventario" class="section">
        <h2>Inventario</h2>
        <div style="background:#f8fafc; padding:15px; border-radius:10px; margin-bottom:20px; display:grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap:10px;">
            <input type="text" id="inv-nombre" placeholder="Nuevo Nombre">
            <input type="number" id="inv-stock" placeholder="Stock Inicial">
            <input type="number" step="0.01" id="inv-costo" placeholder="Costo $">
            <input type="number" step="0.01" id="inv-precio" placeholder="Venta $">
            <button onclick="agregarProducto()" style="background:var(--primary); color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">+ Agregar</button>
        </div>
        <table id="tabla-inv">
            <thead><tr><th>Nombre</th><th>Stock</th><th>Costo ($)</th><th>Venta ($)</th><th></th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <div id="historial" class="section">
        <h2>Historial de Ventas</h2>
        <table id="tabla-hist">
            <thead><tr><th>Fecha</th><th>Cliente</th><th>Monto $</th><th>Monto Bs</th><th>Estado</th><th>Acción</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://osdvdutepsfpxfijeatd.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9zZHZkdXRlcHNmcHhmaWplYXRkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3NzQ0MzgsImV4cCI6MjA4OTM1MDQzOH0.OWUMwz0LKvP2ifedGVjErOkGuKXvCxF6lMnyn6Nebks';
    const { createClient } = supabase;
    const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    let carrito = [];
    let productosLocal = [];

    async function cargarTasaBD() {
        const { data } = await _supabase.from('configuracion').select('tasa_bcv').eq('id', 1).single();
        if (data) document.getElementById('tasa-val').value = data.tasa_bcv;
    }

    async function guardarTasaBD(valor) {
        await _supabase.from('configuracion').update({ tasa_bcv: parseFloat(valor) }).eq('id', 1);
        dibujarCarrito();
    }

    function showTab(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('btn-' + id).classList.add('active');
        if(id === 'pos') cargarPOS();
        if(id === 'inventario') cargarInventario();
        if(id === 'historial') cargarHistorial();
    }

    async function cargarPOS() {
        await cargarTasaBD();
        const { data } = await _supabase.from('productos').select('*').order('nombre');
        productosLocal = data;
        const lista = document.getElementById('pos-lista');
        lista.innerHTML = productosLocal.map(p => {
            const agotado = p.stock <= 0;
            return `<div class="product-btn ${agotado ? 'agotado' : ''}" onclick="${agotado ? '' : `agregarAlCarrito(${p.id})`}">
                <strong>${p.nombre}</strong><br><span>$${p.precio_venta}</span><br><small>${agotado ? 'AGOTADO' : `${p.stock} disp.`}</small>
            </div>`;
        }).join('');
    }

    function agregarAlCarrito(id) {
        const i = productosLocal.findIndex(p => p.id === id);
        if (productosLocal[i].stock > 0) {
            productosLocal[i].stock--;
            carrito.push({...productosLocal[i]});
            cargarPOS(); 
            dibujarCarrito();
        }
    }

    function dibujarCarrito() {
        const div = document.getElementById('carrito-items');
        const tasa = parseFloat(document.getElementById('tasa-val').value) || 0;
        let total = 0;
        div.innerHTML = carrito.map((item, i) => {
            total += item.precio_venta;
            return `<div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>${item.nombre}</span><span>$${item.precio_venta}</span></div>`;
        }).join('');
        document.getElementById('total-usd').textContent = `$${total.toFixed(2)}`;
        document.getElementById('total-bs').textContent = `Bs ${(total * tasa).toFixed(2)}`;
    }

    async function finalizarVenta(estado) {
        if(carrito.length === 0) return;
        const total = carrito.reduce((acc, i) => acc + i.precio_venta, 0);
        const tasa = parseFloat(document.getElementById('tasa-val').value);
        const cliente = document.getElementById('cliente-nombre').value || 'Cliente Gral';
        const detalle = carrito.map(c => c.nombre).join(', ');

        await _supabase.from('ventas').insert({
            cliente_nombre: cliente, productos_detalle: detalle,
            total_usd: total, tasa_momento: tasa, total_bs: total * tasa, estado: estado
        });

        const conteo = {};
        carrito.forEach(x => { conteo[x.id] = (conteo[x.id] || 0) + 1; });
        for (const id in conteo) { await _supabase.rpc('increment_stock', { row_id: id, x: -conteo[id] }); }

        carrito = [];
        document.getElementById('cliente-nombre').value = '';
        cargarPOS();
        dibujarCarrito();
    }

    // --- INVENTARIO EDITABLE ---
    async function cargarInventario() {
        const { data } = await _supabase.from('productos').select('*').order('nombre');
        const tbody = document.querySelector('#tabla-inv tbody');
        tbody.innerHTML = data.map(p => `
            <tr id="row-${p.id}">
                <td><input type="text" class="input-inline" value="${p.nombre}" id="edit-nom-${p.id}"></td>
                <td>
                    <button class="btn-stock" style="background:var(--danger)" onclick="modStockBD(${p.id}, ${p.stock}, -1)">-</button>
                    <span style="font-weight:bold; margin:0 5px;">${p.stock}</span>
                    <button class="btn-stock" style="background:var(--success)" onclick="modStockBD(${p.id}, ${p.stock}, 1)">+</button>
                </td>
                <td><input type="number" step="0.01" class="input-inline" value="${p.costo}" id="edit-cos-${p.id}"></td>
                <td><input type="number" step="0.01" class="input-inline" value="${p.precio_venta}" id="edit-pre-${p.id}"></td>
                <td><button class="btn-save-row" onclick="guardarFila(${p.id})">✓</button></td>
            </tr>
        `).join('');
    }

    async function guardarFila(id) {
        const nombre = document.getElementById(`edit-nom-${id}`).value;
        const costo = parseFloat(document.getElementById(`edit-cos-${id}`).value);
        const precio = parseFloat(document.getElementById(`edit-pre-${id}`).value);

        const { error } = await _supabase.from('productos').update({ 
            nombre: nombre, costo: costo, precio_venta: precio 
        }).eq('id', id);

        if(!error) {
            alert("✅ Guardado");
            cargarInventario();
        }
    }

    async function modStockBD(id, actual, cambio) {
        await _supabase.from('productos').update({ stock: actual + cambio }).eq('id', id);
        cargarInventario();
    }

    async function agregarProducto() {
        const nombre = document.getElementById('inv-nombre').value;
        const stock = parseInt(document.getElementById('inv-stock').value) || 0;
        const costo = parseFloat(document.getElementById('inv-costo').value) || 0;
        const precio = parseFloat(document.getElementById('inv-precio').value) || 0;
        await _supabase.from('productos').upsert({ nombre, stock, costo, precio_venta: precio }, { onConflict: 'nombre' });
        cargarInventario();
        document.querySelectorAll('#inventario input').forEach(i => i.value = '');
    }

    async function cargarHistorial() {
        const { data } = await _supabase.from('ventas').select('*').order('fecha', {ascending:false});
        const tbody = document.querySelector('#tabla-hist tbody');
        tbody.innerHTML = data.map(v => `
            <tr>
                <td style="font-size:0.8rem;">${new Date(v.fecha).toLocaleDateString()}</td>
                <td><strong>${v.cliente_nombre}</strong></td>
                <td>$${v.total_usd}</td>
                <td>Bs ${v.total_bs.toFixed(2)}</td>
                <td><span style="color:${v.estado === 'pendiente' ? 'red' : 'green'}; font-weight:bold;">${v.estado.toUpperCase()}</span></td>
                <td>${v.estado === 'pendiente' ? `<button onclick="pagarV(${v.id})">Cobrar</button>` : '✅'}</td>
            </tr>
        `).join('');
    }

    async function pagarV(id) {
        await _supabase.from('ventas').update({ estado: 'pagado' }).eq('id', id);
        cargarHistorial();
    }

    function limpiarCarrito() {
        carrito = [];
        cargarPOS();
        dibujarCarrito();
    }

    window.onload = cargarPOS;
</script>
</body>
</html>
