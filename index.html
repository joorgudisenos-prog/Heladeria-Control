<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cali Control v3.0 - BCV Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #2563eb; --success: #22c55e; --warning: #f59e0b; --danger: #ef4444; --dark: #1e293b; --light-green: #dcfce7; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f1f5f9; padding-bottom: 50px; }
        nav { background: var(--dark); padding: 12px; display: flex; justify-content: center; gap: 8px; position: sticky; top: 0; z-index: 1000; overflow-x: auto; }
        nav button { background: rgba(255,255,255,0.1); border: none; color: white; padding: 10px 15px; border-radius: 8px; cursor: pointer; white-space: nowrap; }
        nav button.active { background: var(--primary); font-weight: bold; }
        .container { max-width: 1000px; margin: 20px auto; padding: 0 15px; }
        .section { display: none; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .section.active { display: block; }
        .pos-layout { display: grid; grid-template-columns: 1fr 340px; gap: 20px; }
        @media (max-width: 800px) { .pos-layout { grid-template-columns: 1fr; } }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
        .product-btn { background: var(--light-green); border: 2px solid #bbf7d0; padding: 15px; border-radius: 12px; text-align: center; cursor: pointer; color: #166534; transition: 0.2s; }
        .product-btn.agotado { background: #fee2e2; border-color: #fca5a5; color: #991b1b; cursor: not-allowed; opacity: 0.7; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.9rem; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #f1f5f9; }
        .btn-stock { width: 30px; height: 30px; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; }
        .btn-del { background: none; border: none; color: var(--danger); font-weight: bold; cursor: pointer; font-size: 1.1rem; padding: 5px; }
    </style>
</head>
<body>

<nav>
    <button onclick="showTab('pos')" id="btn-pos" class="active">🛒 Vender</button>
    <button onclick="showTab('inventario')" id="btn-inventario">📦 Inventario</button>
    <button onclick="showTab('historial')" id="btn-historial">📜 Historial</button>
    <button onclick="showTab('caja')" id="btn-caja">💰 Caja / Saldo</button>
</nav>

<div class="container">
    <div id="pos" class="section active">
        <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom:15px;">
            <h2>Punto de Venta</h2>
            <div style="background:#e0f2fe; padding:10px; border-radius:8px; display:flex; align-items:center; gap:8px;">
                Tasa BCV: 
                <input type="number" id="tasa-val" step="0.01" onchange="guardarTasaBD(this.value)" style="width:75px; font-weight:bold; border:none; background:transparent; color:var(--primary);">
                <button onclick="actualizarTasaAutomatica()" style="background:#2563eb; color:white; border:none; border-radius:4px; padding:2px 6px; cursor:pointer; font-size:0.8rem;">ACTUALIZAR</button>
            </div>
        </div>
        <div class="pos-layout">
            <div id="pos-lista" class="products-grid"></div>
            <div class="cart-panel" style="background:#f8fafc; padding:15px; border-radius:12px; border:1px solid #ddd;">
                <h3>Pedido Actual</h3>
                <input type="text" id="cliente-nombre" placeholder="Nombre del Cliente" style="width:90%; padding:10px; border-radius:8px; border:1px solid #ccc; margin-bottom:10px;">
                <div id="carrito-items" style="min-height:80px; border-bottom:1px solid #ddd; margin-bottom:10px;"></div>
                <div style="margin-bottom:15px;">
                    <strong>Total USD: </strong><span id="total-usd" style="color:var(--success); font-size:1.2rem;">$0.00</span><br>
                    <strong>Total Bs: </strong><span id="total-bs" style="color:var(--primary); font-size:1.4rem;">Bs 0.00</span>
                </div>
                <button onclick="finalizarVenta('pagado')" style="width:100%; background:var(--success); color:white; border:none; padding:12px; border-radius:8px; margin-bottom:8px; cursor:pointer; font-weight:bold;">CONFIRMAR PAGO</button>
                <button onclick="finalizarVenta('pendiente')" style="width:100%; background:var(--warning); color:white; border:none; padding:12px; border-radius:8px; cursor:pointer; font-weight:bold;">PAGO PENDIENTE</button>
            </div>
        </div>
    </div>

    <div id="inventario" class="section">
        <h2>Inventario</h2>
        <table id="tabla-inv"><thead><tr><th>Producto</th><th>Stock</th><th>Acción</th></tr></thead><tbody></tbody></table>
    </div>

    <div id="historial" class="section">
        <h2>Ventas</h2>
        <input type="month" id="filtro-mes" onchange="cargarHistorial()">
        <table id="tabla-hist"><thead><tr><th>Fecha</th><th>Cliente</th><th>Total $</th><th>Estado</th><th></th></tr></thead><tbody></tbody></table>
    </div>

    <div id="caja" class="section">
        <h2>Saldo</h2>
        <input type="month" id="filtro-caja" onchange="cargarCaja()">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top:15px;">
            <div style="background:var(--primary); color:white; padding:20px; border-radius:12px;"><h3>Total $</h3><p id="caja-total-usd" style="font-size:1.5rem;">$0.00</p></div>
            <div style="background:var(--success); color:white; padding:20px; border-radius:12px;"><h3>Total Bs</h3><p id="caja-total-bs" style="font-size:1.5rem;">Bs 0.00</p></div>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://osdvdutepsfpxfijeatd.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9zZHZkdXRlcHNmcHhmaWplYXRkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3NzQ0MzgsImV4cCI6MjA4OTM1MDQzOH0.OWUMwz0LKvP2ifedGVjErOkGuKXvCxF6lMnyn6Nebks';
    const { createClient } = supabase;
    const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    let carrito = [];
    let productosLocal = [];

    window.onload = async () => {
        const ahora = new Date();
        document.getElementById('filtro-mes').value = ahora.toISOString().substring(0, 7);
        document.getElementById('filtro-caja').value = ahora.toISOString().substring(0, 7);
        await cargarTasaBD();
        await actualizarTasaAutomatica();
        cargarPOS();
    };

    async function cargarTasaBD() {
        const { data } = await _supabase.from('configuracion').select('tasa_bcv').eq('id', 1).single();
        if (data) document.getElementById('tasa-val').value = data.tasa_bcv;
    }

    async function guardarTasaBD(valor) {
        await _supabase.from('configuracion').update({ tasa_bcv: parseFloat(valor) }).eq('id', 1);
        dibujarCarrito();
    }

    async function actualizarTasaAutomatica() {
        const input = document.getElementById('tasa-val');
        const proxy = "https://api.allorigins.win/get?url=";
        const target = encodeURIComponent("https://ve.dolarapi.com/v1/dolares/oficial");
        
        try {
            const res = await fetch(proxy + target);
            const json = await res.json();
            const data = JSON.parse(json.contents);
            if(data.promedio) {
                input.value = data.promedio;
                await guardarTasaBD(data.promedio);
            }
        } catch(e) { alert("Error al conectar con BCV. Ponla manual."); }
    }

    function showTab(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('btn-' + id).classList.add('active');
        if(id === 'pos') cargarPOS();
        if(id === 'inventario') cargarInventario();
        if(id === 'historial') cargarHistorial();
        if(id === 'caja') cargarCaja();
    }

    async function cargarPOS() {
        const { data } = await _supabase.from('productos').select('*').order('nombre');
        productosLocal = data || [];
        renderBotones();
    }

    function renderBotones() {
        document.getElementById('pos-lista').innerHTML = productosLocal.map(p => `
            <div class="product-btn ${p.stock <= 0 ? 'agotado' : ''}" onclick="${p.stock > 0 ? `add(${p.id})` : ''}">
                <strong>${p.nombre}</strong><br>$${p.precio_venta}<br><small>${p.stock} disp.</small>
            </div>
        `).join('');
    }

    function add(id) {
        const p = productosLocal.find(x => x.id === id);
        p.stock--;
        carrito.push({...p});
        renderBotones();
        dibujarCarrito();
    }

    function dibujarCarrito() {
        const tasa = parseFloat(document.getElementById('tasa-val').value) || 0;
        let total = 0;
        document.getElementById('carrito-items').innerHTML = carrito.map((item, i) => {
            total += item.precio_venta;
            return `<div>${item.nombre} - $${item.precio_venta}</div>`;
        }).join('');
        document.getElementById('total-usd').textContent = `$${total.toFixed(2)}`;
        document.getElementById('total-bs').textContent = `Bs ${(total * tasa).toFixed(2)}`;
    }

    async function finalizarVenta(estado) {
        if(carrito.length === 0) return;
        const totalUsd = carrito.reduce((acc, i) => acc + i.precio_venta, 0);
        const tasa = parseFloat(document.getElementById('tasa-val').value);
        
        const { error } = await _supabase.from('ventas').insert({
            cliente_nombre: document.getElementById('cliente-nombre').value || 'Gral',
            productos_detalle: carrito.map(c => c.nombre).join(','),
            total_usd: totalUsd, tasa_momento: tasa, total_bs: totalUsd * tasa, estado: estado
        });

        if(error) { alert("Error DB: " + error.message); return; }

        for (const item of carrito) {
            await _supabase.rpc('increment_stock', { row_id: item.id, x: -1 });
        }

        alert("Venta guardada");
        carrito = [];
        document.getElementById('cliente-nombre').value = '';
        cargarPOS();
        dibujarCarrito();
    }

    async function cargarInventario() {
        const { data } = await _supabase.from('productos').select('*').order('nombre');
        document.querySelector('#tabla-inv tbody').innerHTML = data.map(p => `
            <tr>
                <td>${p.nombre}</td>
                <td>
                    <button onclick="modStock(${p.id}, ${p.stock}, -1)">-</button>
                    ${p.stock}
                    <button onclick="modStock(${p.id}, ${p.stock}, 1)">+</button>
                </td>
                <td>$${p.precio_venta}</td>
            </tr>
        `).join('');
    }

    async function modStock(id, actual, cambio) {
        await _supabase.from('productos').update({ stock: actual + cambio }).eq('id', id);
        cargarInventario();
    }

    async function cargarHistorial() {
        const mes = document.getElementById('filtro-mes').value;
        const { data } = await _supabase.from('ventas').select('*').order('fecha', {ascending:false});
        const filtrados = data ? data.filter(v => v.fecha.startsWith(mes)) : [];
        document.querySelector('#tabla-hist tbody').innerHTML = filtrados.map(v => `
            <tr>
                <td>${v.fecha.substring(8,10)}</td>
                <td>${v.cliente_nombre}</td>
                <td>$${v.total_usd}</td>
                <td>${v.estado}</td>
                <td><button onclick="borrarV(${v.id})">✕</button></td>
            </tr>
        `).join('');
    }

    async function borrarV(id) {
        await _supabase.from('ventas').delete().eq('id', id);
        cargarHistorial();
    }

    async function cargarCaja() {
        const mes = document.getElementById('filtro-caja').value;
        const { data } = await _supabase.from('ventas').select('*');
        const mesData = data.filter(v => v.fecha.startsWith(mes));
        document.getElementById('caja-total-usd').textContent = `$${mesData.reduce((a,b) => a+b.total_usd, 0).toFixed(2)}`;
        document.getElementById('caja-total-bs').textContent = `Bs ${mesData.reduce((a,b) => a+b.total_bs, 0).toFixed(2)}`;
    }
</script>
</body>
</html>
