<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cali Control - Heladería</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #2563eb; --success: #10b981; --warning: #f59e0b; --danger: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f1f5f9; }
        nav { background: var(--primary); padding: 1rem; display: flex; gap: 10px; position: sticky; top: 0; z-index: 100; }
        nav button { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        nav button.active { background: white; color: var(--primary); font-weight: bold; }
        .container { max-width: 1000px; margin: 20px auto; padding: 20px; background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .section { display: none; }
        .section.active { display: block; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 20px; background: #f8fafc; padding: 15px; border-radius: 8px; }
        input { padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; }
        button.main-btn { background: var(--primary); color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e2e8f0; }
    </style>
</head>
<body>

<nav>
    <button onclick="showTab('inventario')" id="btn-inventario" class="active">Inventario</button>
    <button onclick="showTab('caja')" id="btn-caja">Caja y Saldo</button>
</nav>

<div class="container">
    <div id="inventario" class="section active">
        <h2>📦 Inventario Helados Cali</h2>
        <div class="form-grid">
            <input type="text" id="inv-nombre" placeholder="Nombre">
            <input type="number" id="inv-stock" placeholder="Stock">
            <input type="number" step="0.01" id="inv-costo" placeholder="Costo $">
            <input type="number" step="0.01" id="inv-precio" placeholder="Venta $">
            <button class="main-btn" onclick="guardarProducto()">Guardar Helado</button>
        </div>
        <table id="tabla-inventario">
            <thead><tr><th>Producto</th><th>Stock</th><th>Costo</th><th>Venta</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <div id="caja" class="section">
        <h2>💰 Saldo (Tasa BCV)</h2>
        <p>Aquí configuraremos la tasa y las ventas pendientes en el siguiente paso.</p>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://osdvdutepsfpxfijeatd.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9zZHZkdXRlcHNmcHhmaWplYXRkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3NzQ0MzgsImV4cCI6MjA4OTM1MDQzOH0.OWUMwz0LKvP2ifedGVjErOkGuKXvCxF6lMnyn6Nebks';
    
    // Corregido: Usamos el nombre correcto de la librería
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function showTab(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('btn-' + id).classList.add('active');
    }

    async function cargarInventario() {
        const { data, error } = await supabase.from('productos').select('*').order('nombre');
        if (error) { console.log("Error cargando:", error); return; }
        
        const tbody = document.querySelector('#tabla-inventario tbody');
        tbody.innerHTML = '';
        data.forEach(p => {
            tbody.innerHTML += `<tr>
                <td>${p.nombre}</td>
                <td>${p.stock}</td>
                <td>$${p.costo}</td>
                <td>$${p.precio_venta}</td>
            </tr>`;
        });
    }

    async function guardarProducto() {
        const nombre = document.getElementById('inv-nombre').value;
        const stock = parseInt(document.getElementById('inv-stock').value);
        const costo = parseFloat(document.getElementById('inv-costo').value);
        const precio = parseFloat(document.getElementById('inv-precio').value);

        const { error } = await supabase.from('productos').upsert({ 
            nombre: nombre, 
            stock: stock, 
            costo: costo, 
            precio_venta: precio 
        }, { onConflict: 'nombre' });

        if (error) {
            alert("Error: " + error.message);
        } else {
            alert("¡Guardado con éxito!");
            cargarInventario();
        }
    }

    cargarInventario();
</script>
</body>
</html>
