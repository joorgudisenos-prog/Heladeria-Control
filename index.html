<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cali Control v3.1 - Gestión Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #2563eb; --success: #22c55e; --warning: #f59e0b; --danger: #ef4444; --dark: #1e293b; --light-green: #dcfce7; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f1f5f9; padding-bottom: 50px; }
        nav { background: var(--dark); padding: 12px; display: flex; justify-content: center; gap: 8px; position: sticky; top: 0; z-index: 1000; overflow-x: auto; }
        nav button { background: rgba(255,255,255,0.1); border: none; color: white; padding: 10px 15px; border-radius: 8px; cursor: pointer; white-space: nowrap; }
        nav button.active { background: var(--primary); font-weight: bold; }
        .container { max-width: 1000px; margin: 20px auto; padding: 0 15px; }
        .section { display: none; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .section.active { display: block; }
        .pos-layout { display: grid; grid-template-columns: 1fr 340px; gap: 20px; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
        .product-btn { background: var(--light-green); border: 2px solid #bbf7d0; padding: 15px; border-radius: 12px; text-align: center; cursor: pointer; color: #166534; }
        .product-btn.agotado { background: #fee2e2; border-color: #fca5a5; color: #991b1b; cursor: not-allowed; opacity: 0.7; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.85rem; }
        th, td { padding: 8px; text-align: left; border-bottom: 1px solid #f1f5f9; }
        .btn-stock { width: 30px; height: 30px; border: none; border-radius: 6px; color: white; cursor: pointer; }
        .input-edit { width: 60px; padding: 4px; border: 1px solid #ddd; border-radius: 4px; }
    </style>
</head>
<body>

<nav>
    <button onclick="showTab('pos')" id="btn-pos" class="active">🛒 Vender</button>
    <button onclick="showTab('inventario')" id="btn-inventario">📦 Inventario</button>
    <button onclick="showTab('historial')" id="btn-historial">📜 Historial</button>
    <button onclick="showTab('caja')" id="btn-caja">💰 Caja / Saldo</button>
</nav>

<div class="container">
    <div id="pos" class="section active">
        <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom:15px;">
            <h2>Punto de Venta</h2>
            <div style="background:#e0f2fe; padding:10px; border-radius:8px;">
                Tasa: <input type="number" id="tasa-val" step="0.01" onchange="guardarTasaBD(this.value)" style="width:70px; font-weight:bold;">
            </div>
        </div>
        <div class="pos-layout">
            <div id="pos-lista" class="products-grid"></div>
            <div class="cart-panel" style="background:#f8fafc; padding:15px; border-radius:12px; border:1px solid #ddd;">
                <input type="text" id="cliente-nombre" placeholder="Cliente" style="width:90%; padding:8px; margin-bottom:10px;">
                <div id="carrito-items"></div>
                <p><strong>Total USD:</strong> <span id="total-usd">$0.00</span></p>
                <p><strong>Total Bs:</strong> <span id="total-bs">Bs 0.00</span></p>
                <button onclick="finalizarVenta('pagado')" style="width:100%; background:var(--success); color:white; padding:10px; margin-bottom:5px;">PAGADO</button>
                <button onclick="finalizarVenta('pendiente')" style="width:100%; background:var(--warning); color:white; padding:10px;">PENDIENTE</button>
            </div>
        </div>
    </div>

    <div id="inventario" class="section">
        <h2>Gestión de Inventario</h2>
        <div style="background:#f1f5f9; padding:15px; border-radius:10px; margin-bottom:20px; display:flex; gap:10px; flex-wrap:wrap;">
            <input type="text" id="new-nombre" placeholder="Nuevo Helado" style="flex:1; padding:8px;">
            <input type="number" id="new-costo" placeholder="Costo $" style="width:80px; padding:8px;">
            <input type="number" id="new-venta" placeholder="Venta $" style="width:80px; padding:8px;">
            <button onclick="crearProducto()" style="background:var(--primary); color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">+ AÑADIR</button>
        </div>
        <table id="tabla-inv">
            <thead><tr><th>Producto</th><th>Stock</th><th>Costo $</th><th>Venta $</th><th>Acción</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <div id="historial" class="section">
        <h2>Ventas Realizadas</h2>
        <input type="month" id="filtro-mes" onchange="cargarHistorial()" style="padding:8px; margin-bottom:10px;">
        <table id="tabla-hist">
            <thead><tr><th>Fecha</th><th>Cliente</th><th>Total $</th><th>Total Bs (Tasa)</th><th>Estado</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <div id="caja" class="section">
        <h2>Resumen de Saldo</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top:20px;">
            <div style="background:var(--success); color:white; padding:15px; border-radius:10px;">
                <h3>Recibido en Bs</h3>
                <p id="caja-total-bs" style="font-size:1.5rem; font-weight:bold;">Bs 0.00</p>
                <small>Basado en ventas 'Pagadas'</small>
            </div>
            <div style="background:var(--warning); color:white; padding:15px; border-radius:10px;">
                <h3>Por Cobrar ($)</h3>
                <p id="caja-pendiente-usd" style="font-size:1.5rem; font-weight:bold;">$0.00</p>
                <small>Ventas 'Pendientes'</small>
            </div>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://osdvdutepsfpxfijeatd.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9zZHZkdXRlcHNmcHhmaWplYXRkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3NzQ0MzgsImV4cCI6MjA4OTM1MDQzOH0.OWUMwz0LKvP2ifedGVjErOkGuKXvCxF6lMnyn6Nebks';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let carrito = [];
    let productosLocal = [];

    // --- FUNCIONES INVENTARIO ---
    async function crearProducto() {
        const nombre = document.getElementById('new-nombre').value;
        const costo = parseFloat(document.getElementById('new-costo').value) || 0;
        const venta = parseFloat(document.getElementById('new-venta').value) || 0;
        if(!nombre) return alert("Ponle un nombre");
        await _supabase.from('productos').insert({ nombre, costo, precio_venta: venta, stock: 0 });
        cargarInventario();
        document.getElementById('new-nombre').value = '';
    }

    async function actualizarFila(id, campo, valor) {
        let obj = {}; obj[campo] = valor;
        await _supabase.from('productos').update(obj).eq('id', id);
    }

    async function cargarInventario() {
        const { data } = await _supabase.from('productos').select('*').order('nombre');
        document.querySelector('#tabla-inv tbody').innerHTML = data.map(p => `
            <tr>
                <td><input class="input-edit" style="width:120px" value="${p.nombre}" onchange="actualizarFila(${p.id}, 'nombre', this.value)"></td>
                <td>
                    <button class="btn-stock" style="background:var(--danger)" onclick="modStock(${p.id},${p.stock},-1)">-</button>
                    <b>${p.stock}</b>
                    <button class="btn-stock" style="background:var(--success)" onclick="modStock(${p.id},${p.stock},1)">+</button>
                </td>
                <td><input class="input-edit" type="number" value="${p.costo}" onchange="actualizarFila(${p.id}, 'costo', parseFloat(this.value))"></td>
                <td><input class="input-edit" type="number" value="${p.precio_venta}" onchange="actualizarFila(${p.id}, 'precio_venta', parseFloat(this.value))"></td>
                <td><button onclick="borrarP(${p.id})" style="border:none; color:red; cursor:pointer;">✕</button></td>
            </tr>
        `).join('');
    }

    // --- FUNCIONES HISTORIAL Y CAJA ---
    async function cargarHistorial() {
        const mes = document.getElementById('filtro-mes').value;
        const { data } = await _supabase.from('ventas').select('*').order('fecha', {ascending:false});
        const filtrados = data ? data.filter(v => v.fecha.startsWith(mes)) : [];
        
        document.querySelector('#tabla-hist tbody').innerHTML = filtrados.map(v => `
            <tr>
                <td>${v.fecha.substring(8,10)}/${v.fecha.substring(5,7)}</td>
                <td>${v.cliente_nombre}</td>
                <td>$${v.total_usd.toFixed(2)}</td>
                <td>Bs ${(v.total_bs || 0).toFixed(2)} <small>(${v.tasa_momento})</small></td>
                <td style="color:${v.estado === 'pendiente' ? 'red' : 'green'}"><strong>${v.estado}</strong></td>
            </tr>
        `).join('');
    }

    async function cargarCaja() {
        const mes = document.getElementById('filtro-caja')?.value || new Date().toISOString().substring(0, 7);
        const { data } = await _supabase.from('ventas').select('*');
        if(!data) return;
        
        const pagados = data.filter(v => v.estado === 'pagado');
        const pendientes = data.filter(v => v.estado === 'pendiente');

        document.getElementById('caja-total-bs').textContent = `Bs ${pagados.reduce((a,b) => a + (b.total_bs || 0), 0).toFixed(2)}`;
        document.getElementById('caja-pendiente-usd').textContent = `$${pendientes.reduce((a,b) => a + b.total_usd, 0).toFixed(2)}`;
    }

    // --- LÓGICA BASE (VENDER) ---
    async function cargarPOS() {
        const { data } = await _supabase.from('productos').select('*').order('nombre');
        productosLocal = data || [];
        document.getElementById('pos-lista').innerHTML = productosLocal.map(p => `
            <div class="product-btn ${p.stock <= 0 ? 'agotado' : ''}" onclick="${p.stock > 0 ? `addCart(${p.id})` : ''}">
                <strong>${p.nombre}</strong><br>$${p.precio_venta.toFixed(2)}<br><small>${p.stock} disp.</small>
            </div>
        `).join('');
    }

    function addCart(id) {
        const p = productosLocal.find(x => x.id === id);
        p.stock--;
        carrito.push({...p});
        cargarPOS();
        dibujarCarrito();
    }

    function dibujarCarrito() {
        const tasa = parseFloat(document.getElementById('tasa-val').value) || 0;
        let total = 0;
        document.getElementById('carrito-items').innerHTML = carrito.map(i => {
            total += i.precio_venta;
            return `<div>${i.nombre} - $${i.precio_venta}</div>`;
        }).join('');
        document.getElementById('total-usd').textContent = `$${total.toFixed(2)}`;
        document.getElementById('total-bs').textContent = `Bs ${(total * tasa).toFixed(2)}`;
    }

    async function finalizarVenta(estado) {
        if(carrito.length === 0) return;
        const totalU = carrito.reduce((a, b) => a + b.precio_venta, 0);
        const tasa = parseFloat(document.getElementById('tasa-val').value);
        
        await _supabase.from('ventas').insert({
            cliente_nombre: document.getElementById('cliente-nombre').value || 'Gral',
            productos_detalle: carrito.map(c => c.nombre).join(', '),
            total_usd: totalU, tasa_momento: tasa, total_bs: totalU * tasa, estado: estado
        });

        for (const item of carrito) { await _supabase.rpc('increment_stock', { row_id: item.id, x: -1 }); }
        carrito = []; cargarPOS(); dibujarCarrito();
    }

    function showTab(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('btn-' + id).classList.add('active');
        if(id === 'inventario') cargarInventario();
        if(id === 'historial') cargarHistorial();
        if(id === 'caja') cargarCaja();
    }

    window.onload = async () => {
        const { data } = await _supabase.from('configuracion').select('tasa_bcv').eq('id', 1).single();
        if (data) document.getElementById('tasa-val').value = data.tasa_bcv;
        cargarPOS();
    };

    async function modStock(id, actual, cambio) {
        await _supabase.from('productos').update({ stock: actual + cambio }).eq('id', id);
        cargarInventario();
    }
</script>
</body>
</html>
